<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eddsworld – OVERTIME SPARES | Coming Soon</title>
  <link rel="icon" type="image/png" href="eddsworldovertime.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green:  #4caf50;
      --dkgreen:#2e7d32;
      --red:    #e53935;
      --yellow: #fdd835;
      --blue:   #1e88e5;
      --cola:   #8d1a00;
      --white:  #f5f5f5;
      --dark:   #111111;
      --ink:    #1a1a1a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark);
      font-family: 'Nunito', sans-serif;
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ── halftone bg ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(circle, #4caf5022 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── scan lines ── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,.18) 3px,
        rgba(0,0,0,.18) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* ── floating cola cans ── */
    .can { position: fixed; font-size: 2.4rem; opacity: .13; animation: floatCan linear infinite; pointer-events: none; z-index: 0; }
    .can:nth-child(1) { left:5%;  animation-duration:14s; animation-delay:0s;   top:110%; }
    .can:nth-child(2) { left:20%; animation-duration:18s; animation-delay:3s;   top:110%; }
    .can:nth-child(3) { left:40%; animation-duration:12s; animation-delay:7s;   top:110%; }
    .can:nth-child(4) { left:60%; animation-duration:20s; animation-delay:1s;   top:110%; }
    .can:nth-child(5) { left:80%; animation-duration:16s; animation-delay:5s;   top:110%; }
    .can:nth-child(6) { left:92%; animation-duration:22s; animation-delay:9s;   top:110%; }
    @keyframes floatCan {
      0%   { transform: translateY(0)   rotate(0deg); }
      100% { transform: translateY(-120vh) rotate(360deg); }
    }

    /* ── wrapper ── */
    .wrapper {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem 1rem;
      text-align: center;
    }

    /* ── OVERTIME badge ── */
    .badge {
      display: inline-block;
      background: var(--red);
      color: var(--white);
      font-family: 'Bangers', cursive;
      font-size: clamp(1rem, 3vw, 1.4rem);
      letter-spacing: .2em;
      padding: .35em 1.2em;
      border-radius: 3px;
      border: 3px solid var(--white);
      box-shadow: 4px 4px 0 var(--dark);
      margin-bottom: 1.2rem;
      animation: badgePop .6s cubic-bezier(.36,1.6,.3,1) both;
    }
    @keyframes badgePop {
      from { transform: scale(0) rotate(-6deg); opacity: 0; }
      to   { transform: scale(1) rotate(-2deg); opacity: 1; }
    }

    /* ── main title ── */
    .title {
      font-family: 'Bangers', cursive;
      font-size: clamp(3.5rem, 14vw, 9rem);
      line-height: .92;
      letter-spacing: .04em;
      color: var(--white);
      text-shadow:
        6px  6px 0 var(--green),
        12px 12px 0 var(--dkgreen),
        -2px -2px 0 var(--ink);
      animation: titleSlide .8s .2s cubic-bezier(.36,1.4,.3,1) both;
      margin-bottom: .4rem;
    }
    @keyframes titleSlide {
      from { transform: translateY(-40px) skewX(-8deg); opacity: 0; }
      to   { transform: none; opacity: 1; }
    }

    .subtitle {
      font-family: 'Bangers', cursive;
      font-size: clamp(1.4rem, 5vw, 3rem);
      color: var(--yellow);
      letter-spacing: .14em;
      text-shadow: 3px 3px 0 #7a6000;
      animation: titleSlide .8s .4s cubic-bezier(.36,1.4,.3,1) both;
      margin-bottom: 2.4rem;
    }

    /* ── divider ── */
    .divider {
      width: min(480px, 90%);
      height: 4px;
      background: repeating-linear-gradient(90deg,
        var(--green) 0, var(--green) 16px,
        var(--red)   16px, var(--red)   32px,
        var(--yellow)32px, var(--yellow)48px,
        var(--blue)  48px, var(--blue)  64px
      );
      border-radius: 2px;
      margin: 0 auto 2.4rem;
      animation: fadeIn .5s .6s both;
    }

    /* ── countdown ── */
    .countdown-wrap {
      display: flex; gap: clamp(.8rem, 3vw, 2rem);
      justify-content: center; flex-wrap: wrap;
      margin-bottom: 2.8rem;
